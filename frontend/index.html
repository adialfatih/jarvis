<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Jarvis Remote Codex</title>
  <script src="https://cdn.jsdelivr.net/npm/ansi_up@5/ansi_up.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0d10;
      --panel: #12171d;
      --panel-2: #19212a;
      --line: #29333e;
      --text: #edf3f8;
      --muted: #8d9aa7;
      --accent: #35c978;
      --danger: #ff625c;
      --warn: #f4b942;
      --blue: #64a9ff;
      --terminal: #06080a;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Segoe UI, system-ui, -apple-system, sans-serif;
    }

    button, input, textarea { font: inherit; }

    button {
      display: inline-grid;
      min-width: 42px;
      min-height: 42px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
    }

    button:disabled { cursor: not-allowed; opacity: .55; }
    button:hover { border-color: #425263; }

    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      outline: none;
      background: #0b0f13;
      color: var(--text);
      padding: 11px 12px;
    }

    input:focus, textarea:focus { border-color: var(--blue); }

    .icon {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2;
    }

    .app {
      height: 100dvh;
      display: grid;
      grid-template-rows: 54px minmax(0, 1fr) auto;
      background: var(--terminal);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 10px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .top-left, .top-right, .status-dots, .composer-actions, .drawer-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand { font-size: 16px; letter-spacing: .12em; }

    .icon-button {
      min-width: 38px;
      min-height: 38px;
      padding: 0;
      background: transparent;
    }

    .status-button {
      display: flex;
      min-width: auto;
      min-height: 38px;
      gap: 7px;
      padding: 0 10px;
      background: transparent;
    }

    .dot {
      width: 9px;
      height: 9px;
      display: block;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 0 2px rgba(255, 98, 92, .12);
    }

    .dot.ok {
      background: var(--accent);
      box-shadow: 0 0 0 2px rgba(53, 201, 120, .12);
    }

    .dot.warn {
      background: var(--warn);
      box-shadow: 0 0 0 2px rgba(244, 185, 66, .12);
    }

    .terminal {
      min-height: 0;
      overflow-y: auto;
      padding: 14px clamp(10px, 3vw, 32px) 22px;
      scroll-behavior: smooth;
    }

    .messages {
      width: min(100%, 1180px);
      min-height: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 0 auto;
    }

    .empty {
      margin: auto;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .message {
      max-width: min(92%, 980px);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      word-break: break-word;
    }

    .message.output {
      align-self: flex-start;
      border-color: transparent;
      background: transparent;
      color: #dbe5ee;
      padding-left: 0;
    }

    .message.user {
      align-self: flex-end;
      border-color: #285c91;
      background: #12385f;
      color: #f3f8fd;
    }

    .output pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font: 13px/1.5 Consolas, "Cascadia Mono", monospace;
    }

    .composer-wrap {
      border-top: 1px solid var(--line);
      background: rgba(18, 23, 29, .98);
      padding: 9px max(9px, env(safe-area-inset-right)) max(9px, env(safe-area-inset-bottom));
    }

    .composer {
      width: min(100%, 1180px);
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: end;
      gap: 8px;
      margin: 0 auto;
    }

    .composer textarea {
      min-height: 44px;
      max-height: 132px;
      resize: none;
      line-height: 20px;
    }

    .mic.recording {
      border-color: var(--danger);
      background: #6e2424;
      color: #fff;
    }

    .send {
      border-color: #2e6ea9;
      background: #185188;
      color: #fff;
    }

    .composer-meta {
      width: min(100%, 1180px);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin: 6px auto 0;
      color: var(--muted);
      font-size: 12px;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      user-select: none;
    }

    .toggle input { width: 15px; height: 15px; }

    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .56);
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
      transition: opacity .22s ease, visibility 0s linear .22s;
    }

    .backdrop.open {
      opacity: 1;
      pointer-events: auto;
      visibility: visible;
      transition-delay: 0s;
    }

    .drawer {
      width: min(92vw, 440px);
      height: 100%;
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr) auto;
      border-right: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 12px 0 32px rgba(0, 0, 0, .28);
      transform: translateX(-100%);
      transition: transform .28s cubic-bezier(.22, 1, .36, 1);
    }

    .backdrop.open .drawer { transform: translateX(0); }

    .drawer-head, .drawer-active, .drawer-search, .drawer-tools {
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .drawer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .drawer-active { background: #101820; }

    .label, .small {
      color: var(--muted);
      font-size: 12px;
    }

    .active-name {
      margin-top: 4px;
      overflow: hidden;
      color: var(--text);
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .active-path {
      margin-top: 3px;
      overflow-wrap: anywhere;
      color: var(--muted);
      font-size: 12px;
    }

    .project-list { overflow-y: auto; padding: 9px 12px; }
    .group { margin-bottom: 15px; }

    .group-title {
      margin: 5px 0 7px;
      overflow-wrap: anywhere;
      color: var(--blue);
      font-size: 12px;
    }

    .project-item {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      margin-bottom: 6px;
      padding: 9px 10px;
      text-align: left;
    }

    .project-item strong, .project-item .small {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      align-self: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 7px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .drawer-tools {
      display: grid;
      gap: 8px;
      border-top: 1px solid var(--line);
      border-bottom: 0;
    }

    .input-action {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 7px;
    }

    .status-popup {
      position: fixed;
      top: 60px;
      right: 10px;
      z-index: 30;
      display: none;
      width: min(310px, calc(100vw - 20px));
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: 0 16px 34px rgba(0, 0, 0, .36);
      padding: 10px;
    }

    .status-popup.open { display: grid; gap: 3px; }

    .status-row {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 8px;
      border-radius: 8px;
      padding: 8px;
      font-size: 13px;
    }

    .toast {
      position: fixed;
      right: 12px;
      bottom: 86px;
      z-index: 40;
      display: none;
      max-width: min(420px, calc(100vw - 24px));
      border: 1px solid #7d3e3b;
      border-radius: 10px;
      background: #402220;
      color: #ffe7e5;
      padding: 10px 12px;
      font-size: 13px;
    }

    .toast.open { display: block; }

    @media (max-width: 540px) {
      .topbar { padding-inline: 8px; }
      .terminal { padding: 11px 9px 17px; }
      .message { max-width: 95%; }
      .output pre { font-size: 12px; }
      .composer-wrap { padding-inline: 7px; }
      .composer { gap: 6px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .backdrop, .drawer { transition: none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="top-left">
        <button id="openProjects" class="icon-button" title="Buka project drawer" aria-label="Buka project drawer">
          <svg class="icon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <strong class="brand">JARVIS</strong>
      </div>
      <div class="top-right">
        <button id="statusButton" class="status-button" title="Lihat status" aria-label="Lihat status">
          <span id="backendDot" class="dot"></span>
          <span id="codexDot" class="dot"></span>
          <span id="whisperDot" class="dot warn"></span>
        </button>
      </div>
    </header>

    <section id="terminal" class="terminal" aria-label="Output Codex">
      <div id="messages" class="messages">
        <div id="emptyState" class="empty">Output Codex akan tampil di sini.</div>
      </div>
    </section>

    <section class="composer-wrap">
      <div class="composer">
        <button id="micButton" class="icon-button mic" title="Rekam suara" aria-label="Rekam suara">
          <svg class="icon" viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 17v4M9 21h6"/></svg>
        </button>
        <textarea id="promptInput" rows="1" placeholder="Ketik perintah atau rekam suara..."></textarea>
        <button id="sendButton" class="icon-button send" title="Kirim ke Codex" aria-label="Kirim ke Codex">
          <svg class="icon" viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        </button>
      </div>
      <div class="composer-meta">
        <label class="toggle"><input id="autoSend" type="checkbox"> Auto-send suara</label>
        <span id="busyText">idle</span>
      </div>
    </section>
  </main>

  <div id="projectBackdrop" class="backdrop" aria-hidden="true">
    <aside class="drawer" aria-label="Project manager">
      <div class="drawer-head">
        <strong>Project</strong>
        <div class="drawer-actions">
          <button id="refreshProjects" class="icon-button" title="Refresh daftar project" aria-label="Refresh daftar project">
            <svg class="icon" viewBox="0 0 24 24"><path d="M20 11a8.1 8.1 0 0 0-15.5-2M4 4v5h5M4 13a8.1 8.1 0 0 0 15.5 2m.5 5v-5h-5"/></svg>
          </button>
          <button id="closeProjects" class="icon-button" title="Tutup drawer" aria-label="Tutup drawer">
            <svg class="icon" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </div>
      <div class="drawer-active">
        <div class="label">Project aktif</div>
        <div id="activeProject" class="active-name">Belum ada project</div>
        <div id="activeProjectMeta" class="active-path">-</div>
        <button id="restartCodex" style="width:100%;margin-top:10px">Restart Codex</button>
      </div>
      <div class="drawer-search">
        <input id="projectSearch" placeholder="Cari nama atau path project...">
      </div>
      <div id="projectList" class="project-list"></div>
      <div class="drawer-tools">
        <div class="label">Buka path manual</div>
        <div class="input-action">
          <input id="manualPath" placeholder="D:\project-lain">
          <button id="addManual" title="Tambah dan buka">Buka</button>
        </div>
        <div class="label">Buat folder dengan command terbatas</div>
        <div class="input-action">
          <input id="projectCommand" placeholder='mkdir "D:\_2026\project-baru"'>
          <button id="runCommand" title="Jalankan mkdir">Run</button>
        </div>
      </div>
    </aside>
  </div>

  <div id="statusPopup" class="status-popup">
    <div class="status-row"><span id="backendPopupDot" class="dot"></span><span id="backendText">Backend offline</span></div>
    <div class="status-row"><span id="codexPopupDot" class="dot"></span><span id="codexText">Codex mati</span></div>
    <div class="status-row"><span id="whisperPopupDot" class="dot warn"></span><span id="whisperText">Whisper loading</span></div>
  </div>
  <div id="toast" class="toast"></div>

  <script>
    const ansi = new AnsiUp();
    const state = {
      projects: [],
      entries: [],
      status: null,
      ws: null,
      mediaRecorder: null,
      chunks: []
    };
    const el = (id) => document.getElementById(id);

    async function api(path, options = {}) {
      const headers = options.body instanceof FormData ? {} : { 'Content-Type': 'application/json' };
      const response = await fetch(path, { ...options, headers: { ...headers, ...(options.headers || {}) } });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.detail || 'Request gagal');
      return data;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
      })[char]);
    }

    function showError(error) {
      el('toast').textContent = error.message || String(error);
      el('toast').classList.add('open');
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => el('toast').classList.remove('open'), 4500);
    }

    function renderMessages() {
      const messages = el('messages');
      messages.innerHTML = state.entries.length ? state.entries.map((entry) => {
        if (entry.type === 'user') return `<div class="message user">${escapeHtml(entry.text)}</div>`;
        return `<div class="message output"><pre>${ansi.ansi_to_html(entry.text)}</pre></div>`;
      }).join('') : '<div class="empty">Output Codex akan tampil di sini.</div>';
      el('terminal').scrollTop = el('terminal').scrollHeight;
    }

    function appendOutput(text) {
      const last = state.entries[state.entries.length - 1];
      if (last && last.type === 'output') last.text += text;
      else state.entries.push({ type: 'output', text });

      let outputLength = state.entries.reduce((sum, entry) => sum + entry.text.length, 0);
      while (outputLength > 160000 && state.entries.length > 1) {
        outputLength -= state.entries.shift().text.length;
      }
      renderMessages();
      setBusy(text.trim() ? 'memproses...' : 'idle');
      clearTimeout(window.busyTimer);
      window.busyTimer = setTimeout(() => setBusy('idle'), 2500);
    }

    function appendUser(text) {
      state.entries.push({ type: 'user', text });
      renderMessages();
    }

    function clearOutput() {
      state.entries = [];
      renderMessages();
    }

    function setBusy(text) { el('busyText').textContent = text; }

    function setDot(id, stateName) {
      el(id).className = `dot ${stateName || ''}`.trim();
    }

    function setBackend(online) {
      setDot('backendDot', online ? 'ok' : '');
      setDot('backendPopupDot', online ? 'ok' : '');
      el('backendText').textContent = online ? 'Backend online' : 'Backend offline';
    }

    function connectWs() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      state.ws = new WebSocket(`${protocol}//${location.host}/ws/output`);
      state.ws.onmessage = (event) => appendOutput(event.data);
      state.ws.onopen = () => setBackend(true);
      state.ws.onclose = () => {
        setBackend(false);
        setTimeout(connectWs, 3000);
      };
    }

    async function loadStatus() {
      try {
        const status = await api('/api/status');
        state.status = status;
        setBackend(true);
        const codexState = status.codex.running ? 'ok' : '';
        setDot('codexDot', codexState);
        setDot('codexPopupDot', codexState);
        el('codexText').textContent = status.codex.busy ? 'Codex sedang memproses' : (status.codex.running ? 'Codex ready' : 'Codex mati');
        updateWhisperStatus(status.whisper);
        const project = status.active_project;
        el('activeProject').textContent = project ? project.name : 'Belum ada project';
        el('activeProjectMeta').textContent = project ? `${project.type} - ${project.path}` : status.codex.error || '-';
      } catch (error) {
        setBackend(false);
      }
    }

    function updateWhisperStatus(whisper) {
      const stateName = whisper.loaded ? 'ok' : (whisper.loading ? 'warn' : '');
      setDot('whisperDot', stateName);
      setDot('whisperPopupDot', stateName);
      el('whisperText').textContent = whisper.loaded
        ? `Whisper ready (${whisper.model_size || '-'})`
        : whisper.loading
          ? `Whisper loading (${whisper.model_size || '-'})`
          : whisper.error ? `Whisper error: ${whisper.error}` : 'Whisper belum siap';
    }

    async function loadProjects() {
      const data = await api('/api/projects');
      state.projects = data.projects || [];
      renderProjects();
    }

    function renderProjects() {
      const query = el('projectSearch').value.trim().toLowerCase();
      const filtered = state.projects.filter((project) =>
        !query || `${project.name} ${project.path} ${project.type}`.toLowerCase().includes(query)
      );
      const groups = filtered.reduce((acc, project) => {
        const key = project.root || 'custom';
        (acc[key] ||= []).push(project);
        return acc;
      }, {});

      el('projectList').innerHTML = Object.entries(groups).map(([root, items]) => `
        <div class="group">
          <div class="group-title">${escapeHtml(root)}</div>
          ${items.map((project) => `
            <button class="project-item" data-path="${escapeHtml(project.path)}">
              <span><strong>${escapeHtml(project.name)}</strong><span class="small">${escapeHtml(project.path)}</span></span>
              <span class="badge">${escapeHtml(project.type)}</span>
            </button>
          `).join('')}
        </div>
      `).join('') || '<div class="small">Project tidak ditemukan.</div>';

      document.querySelectorAll('.project-item').forEach((button) => {
        button.addEventListener('click', () => switchProject(button.dataset.path).catch(showError));
      });
    }

    async function switchProject(path) {
      clearOutput();
      await api('/api/switch-project', { method: 'POST', body: JSON.stringify({ path }) });
      closeDrawer();
      await loadStatus();
    }

    async function refreshProjects() {
      const data = await api('/api/projects/refresh', { method: 'POST', body: '{}' });
      state.projects = data.projects || [];
      renderProjects();
      await loadStatus();
    }

    async function addManualProject() {
      const path = el('manualPath').value.trim();
      if (!path) return;
      await api('/api/projects/custom', { method: 'POST', body: JSON.stringify({ path }) });
      await loadProjects();
      await switchProject(path);
    }

    async function runProjectCommand() {
      const text = el('projectCommand').value.trim();
      if (!text) return;
      const data = await api('/api/projects/command', { method: 'POST', body: JSON.stringify({ text }) });
      state.projects = data.projects || [];
      el('projectCommand').value = '';
      renderProjects();
      await switchProject(data.project.path);
    }

    async function sendPrompt() {
      const input = el('promptInput');
      const text = input.value.trim();
      if (!text) return;
      appendUser(text);
      input.value = '';
      resizePrompt();
      try {
        await api('/api/send', { method: 'POST', body: JSON.stringify({ text }) });
      } catch (error) {
        appendOutput(`[JARVIS] ${error.message}\n`);
        showError(error);
      }
    }

    async function toggleRecording() {
      if (state.mediaRecorder && state.mediaRecorder.state === 'recording') {
        state.mediaRecorder.stop();
        return;
      }
      if (!navigator.mediaDevices?.getUserMedia) throw new Error('Mic perlu HTTPS atau localhost. Gunakan URL HTTPS untuk akses dari HP.');
      if (!window.MediaRecorder) throw new Error('Browser ini tidak mendukung MediaRecorder.');

      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      state.chunks = [];
      state.mediaRecorder = new MediaRecorder(stream);
      state.mediaRecorder.ondataavailable = (event) => {
        if (event.data.size > 0) state.chunks.push(event.data);
      };
      state.mediaRecorder.onstop = async () => {
        stream.getTracks().forEach((track) => track.stop());
        el('micButton').classList.remove('recording');
        try { await uploadAudio(); } catch (error) { showError(error); }
      };
      state.mediaRecorder.start();
      el('micButton').classList.add('recording');
    }

    async function uploadAudio() {
      const form = new FormData();
      form.append('file', new Blob(state.chunks, { type: 'audio/webm' }), 'voice.webm');
      setBusy('transkripsi...');
      const autoSend = el('autoSend').checked;
      const data = await api(autoSend ? '/api/transcribe-and-send' : '/api/transcribe', { method: 'POST', body: form });
      el('promptInput').value = data.text || '';
      resizePrompt();
      if (autoSend && data.text) {
        appendUser(data.text);
        el('promptInput').value = '';
        resizePrompt();
      }
      if (autoSend && data.sent === false) appendOutput('[JARVIS] Transkripsi selesai, tetapi Codex belum siap.\n');
      setBusy('idle');
    }

    function resizePrompt() {
      const input = el('promptInput');
      input.style.height = 'auto';
      input.style.height = `${Math.min(input.scrollHeight, 132)}px`;
    }

    function openDrawer() {
      el('projectBackdrop').classList.add('open');
      el('projectBackdrop').setAttribute('aria-hidden', 'false');
    }

    function closeDrawer() {
      el('projectBackdrop').classList.remove('open');
      el('projectBackdrop').setAttribute('aria-hidden', 'true');
    }

    el('openProjects').addEventListener('click', openDrawer);
    el('closeProjects').addEventListener('click', closeDrawer);
    el('projectBackdrop').addEventListener('click', (event) => {
      if (event.target === el('projectBackdrop')) closeDrawer();
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && el('projectBackdrop').classList.contains('open')) closeDrawer();
    });
    el('statusButton').addEventListener('click', () => el('statusPopup').classList.toggle('open'));
    document.addEventListener('click', (event) => {
      if (!el('statusButton').contains(event.target) && !el('statusPopup').contains(event.target)) el('statusPopup').classList.remove('open');
    });
    el('projectSearch').addEventListener('input', renderProjects);
    el('refreshProjects').addEventListener('click', () => refreshProjects().catch(showError));
    el('addManual').addEventListener('click', () => addManualProject().catch(showError));
    el('manualPath').addEventListener('keydown', (event) => {
      if (event.key === 'Enter') addManualProject().catch(showError);
    });
    el('runCommand').addEventListener('click', () => runProjectCommand().catch(showError));
    el('projectCommand').addEventListener('keydown', (event) => {
      if (event.key === 'Enter') runProjectCommand().catch(showError);
    });
    el('restartCodex').addEventListener('click', async () => {
      clearOutput();
      try {
        await api('/api/restart-codex', { method: 'POST', body: '{}' });
        closeDrawer();
        await loadStatus();
      } catch (error) { showError(error); }
    });
    el('sendButton').addEventListener('click', sendPrompt);
    el('promptInput').addEventListener('input', resizePrompt);
    el('promptInput').addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendPrompt();
      }
    });
    el('micButton').addEventListener('click', () => toggleRecording().catch(showError));

    connectWs();
    loadStatus();
    loadProjects().catch(showError);
    setInterval(loadStatus, 5000);
  </script>
</body>
</html>
